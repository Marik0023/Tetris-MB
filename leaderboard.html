<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Tetris — Leaderboard</title>
  <link rel="icon" href="assets/logo.webp" type="image/webp" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/leaderboard.css" />
</head>
<body>
  <div id="particles-container"></div>

  <div class="lb-page">

    <!-- Header -->
    <header class="lb-header">
      <a href="index.html" class="lb-back-btn">← Back</a>
      <div class="lb-header-center">
        <img src="assets/logo.webp" alt="Magic Tetris" class="lb-logo" />
        <h1 class="lb-page-title">Hall of Wizards</h1>
        <p class="lb-page-sub">Top 10 scores on this device</p>
      </div>
      <button class="lb-clear-btn" id="lb-clear-btn">🗑 Clear</button>
    </header>

    <!-- Stats bar -->
    <div class="lb-stats-bar">
      <div class="lb-stat-chip">
        <span class="chip-label">Total Games</span>
        <span class="chip-val" id="stat-total">—</span>
      </div>
      <div class="lb-stat-chip">
        <span class="chip-label">Best Score</span>
        <span class="chip-val gold" id="stat-best">—</span>
      </div>
      <div class="lb-stat-chip">
        <span class="chip-label">Best Lines</span>
        <span class="chip-val" id="stat-lines">—</span>
      </div>
      <div class="lb-stat-chip">
        <span class="chip-label">Top Player</span>
        <span class="chip-val purple" id="stat-top-player">—</span>
      </div>
    </div>

    <!-- Podium (top 3) -->
    <div class="lb-podium" id="lb-podium"></div>

    <!-- Full table -->
    <div class="lb-table-wrap">
      <table class="lb-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Player</th>
            <th>Score</th>
            <th>Lines</th>
            <th>Level</th>
            <th>Rank</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="lb-table-body"></tbody>
      </table>
      <div id="lb-empty" class="lb-empty-state" style="display:none">
        <span class="lb-empty-icon">🧙</span>
        <p>No scores yet!</p>
        <p>Play a game and become the first Wizard.</p>
        <a href="index.html" class="btn-start" style="display:inline-block;margin-top:16px;text-decoration:none;padding:12px 28px;">✨ Play Now</a>
      </div>
    </div>

  </div>

  <script src="js/leaderboard.js"></script>
  <script src="js/lb-page.js"></script>
</body>
</html>
