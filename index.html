<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Magic Tetris</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="aurora">
  <div class="au au1"></div>
  <div class="au au2"></div>
  <div class="au au3"></div>
</div>
<div id="stars"></div>
<div id="pts"></div>

<!-- PAGE 1 – START -->
<div class="pg on" id="pg-start">
  <div class="logo-anim"><img id="logo-s" src="" alt="Magic Tetris"></div>
  <div class="start-card gcard">
    <div class="gcard-inner">
      <h2>✦ ENTER THE ARENA</h2>
      <p class="sub">Choose your wizard identity</p>

      <div class="av-wrap">
        <div class="av-ring" onclick="document.getElementById('av-in').click()">
          <div class="av-btn" id="av-btn">
            <span class="av-ico" id="av-ico">🧙</span>
            <img class="av-img" id="av-img" alt="">
          </div>
        </div>
        <input type="file" id="av-in" accept="image/*" style="display:none">
        <span class="av-hint">TAP TO UPLOAD AVATAR</span>
      </div>

      <div class="fld">
        <label>✦ Wizard Name</label>
        <input id="nick" type="text" placeholder="Enter your name…" maxlength="18"
               autocomplete="off" onkeydown="if(event.key==='Enter')onStart()">
      </div>

      <button class="btn-main" onclick="onStart()">⚡ START PLAYING</button>
      <button class="btn-sec" onclick="openLB('pg-start')">🏆 Leaderboard</button>
    </div>
  </div>
</div>

<!-- PAGE 2 – GAME -->
<div class="pg" id="pg-game">
  <div class="gh">
    <div class="gh-logo"><img id="logo-g" src="" alt=""></div>
    <div class="gh-right">
      <img class="gh-av" id="gh-av" src="" alt="">
      <span class="gh-nm" id="gh-nm"></span>
    </div>
  </div>

  <div class="gbody">
    <div class="bwrap" id="bwrap">
      <div class="bwrap-in">
        <canvas id="gc"></canvas>
      </div>
      <div class="pov" id="pov">
        <h2>⏸ PAUSED</h2>
        <p>Press P / Esc to resume</p>
      </div>
    </div>

    <div class="sp">
      <div class="sc"><label>⚡ Score</label><div class="sv" id="h-sc">0</div></div>
      <div class="sc"><label>🏆 Best</label><div class="sv gd" id="h-bs">0</div></div>
      <div class="sc"><label>✨ Lines</label><div class="sv" id="h-ln">0</div></div>
      <div class="sc">
        <label>🌟 Level</label>
        <div class="sv pk" id="h-lv">1</div>
        <div class="lbar"><div class="lbar-f" id="lbar-f" style="width:0%"></div></div>
      </div>
      <div class="nc-card">
        <label>👁 Next</label>
        <canvas id="nc" width="84" height="66"></canvas>
      </div>
      <div class="kh">
        <label>⌨ Keys</label>
        <div class="kh-row"><kbd>← →</kbd>Move</div>
        <div class="kh-row"><kbd>↑/X</kbd>Rotate ↻</div>
        <div class="kh-row"><kbd>Z</kbd>Rotate ↺</div>
        <div class="kh-row"><kbd>↓</kbd>Soft drop</div>
        <div class="kh-row"><kbd>Space</kbd>Hard drop</div>
        <div class="kh-row"><kbd>P/Esc</kbd>Pause</div>
      </div>
      <div class="sp-btns">
        <button class="sb sb-r" onclick="askRestart()">↩ Restart</button>
        <button class="sb sb-b" onclick="openLB('pg-game')">🏆 Leaderboard</button>
      </div>
    </div>
  </div>

  <div class="dpad">
    <div class="dp-row">
      <button class="mb" ontouchstart="tap(event,'rcw')" onclick="tap(null,'rcw')">↻</button>
      <button class="mb" ontouchstart="tap(event,'rccw')" onclick="tap(null,'rccw')">↺</button>
    </div>
    <div class="dp-row">
      <button class="mb" ontouchstart="begR(event,'L')" ontouchend="endR()" onmousedown="begR(null,'L')" onmouseup="endR()">←</button>
      <button class="mb" ontouchstart="begR(event,'D')" ontouchend="endR()" onmousedown="begR(null,'D')" onmouseup="endR()">↓</button>
      <button class="mb" ontouchstart="begR(event,'R')" ontouchend="endR()" onmousedown="begR(null,'R')" onmouseup="endR()">→</button>
    </div>
    <div class="dp-row">
      <button class="mb wide drp" ontouchstart="tap(event,'hd')" onclick="tap(null,'hd')">⬇ HARD DROP</button>
    </div>
  </div>
</div>

<!-- PAGE 3 – GAME OVER -->
<div class="pg" id="pg-over">
  <div class="oc gcard">
    <div class="gcard-inner">
      <h2>GAME OVER</h2>
      <img class="oc-av" id="oc-av" src="" alt="">
      <div class="oc-nm" id="oc-nm"></div>
      <div class="oc-rnk" id="oc-rnk">🏆 RANK #1</div>
      <div class="oc-stats">
        <div class="oc-st"><label>Score</label><div class="v" id="oc-sc">0</div></div>
        <div class="oc-st"><label>Best</label><div class="v gd" id="oc-bs">0</div></div>
        <div class="oc-st"><label>Lines</label><div class="v" id="oc-ln">0</div></div>
        <div class="oc-st"><label>Level</label><div class="v" id="oc-lv">0</div></div>
      </div>
      <div class="oc-btns">
        <button class="btn-pa" onclick="playAgain()">⚡ Play Again</button>
        <button class="btn-oa" onclick="openLB('pg-over')">🏆 Leaderboard</button>
      </div>
      <button class="btn-dl" onclick="downloadResult()">📥 Download Result</button>
    </div>
  </div>
</div>

<!-- PAGE 4 – LEADERBOARD -->
<div class="pg" id="pg-lb">
  <div class="lb-hd">
    <button class="btn-bk" onclick="closeLB()">← Back</button>
    <h1>🏆 HALL OF FAME</h1>
    <div style="width:58px"></div>
  </div>
  <div class="podium" id="podium"></div>
  <div class="lb-tbl" id="lb-tbl"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal-wrap gcard">
    <div class="gcard-inner">
      <h3>Restart?</h3>
      <p>Your current game will be lost.</p>
      <div class="modal-row">
        <button class="m-y" onclick="doRestart()">Yes!</button>
        <button class="m-n" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- IMAGE PREVIEW MODAL -->
<div id="img-modal">
  <img id="img-modal-img" src="" alt="Result">
  <div class="img-modal-btns img-modal-btns--single">
    <button class="img-modal-cl" onclick="document.getElementById('img-modal').classList.remove('open')">✕ Close</button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     SCRIPT
══════════════════════════════════════════ -->
<script src="game.js"></script>
</body>
</html>
